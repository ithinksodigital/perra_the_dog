<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Przekierowanie do formularza | perra the dog</title>
  <meta name="robots" content="noindex,follow">
  <link rel="canonical" href="https://perrathedog.pl/formularz/">
  <meta http-equiv="refresh" content="0; url=https://docs.google.com/forms/d/e/1FAIpQLSeBlmSgW0-hdwdbopPXT_53mEr9x1yb5A2fLIOyeW7F5iZQrQ/viewform?usp=sharing">
  <style>
    :root {
      --bg: #f5f3ef;
      --text: #1a1a1a;
      --text-muted: #45454d;
      --accent: #4d8a76;
      --accent-hover: #3d7262;
      --border: rgba(0, 0, 0, 0.08);
      --font-heading: "Cormorant Garamond", Georgia, serif;
      --font-body: "Open Sans", system-ui, sans-serif;
      --radius: 14px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      text-align: center;
    }
    .card {
      max-width: 560px;
      padding: 32px 28px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: #fff;
    }
    h1 {
      margin: 0 0 12px;
      font-family: var(--font-heading);
      font-size: clamp(2rem, 5vw, 3rem);
      line-height: 1.1;
    }
    p {
      margin: 0;
      color: var(--text-muted);
      line-height: 1.65;
    }
    a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    a:hover { color: var(--accent-hover); }
  </style>
</head>
<body>
  <main class="card">
    <h1>Przekierowanie do formularza</h1>
    <p>Za chwilę otworzy się formularz zgłoszeniowy. Jeśli przekierowanie nie nastąpi automatycznie, kliknij <a href="https://docs.google.com/forms/d/e/1FAIpQLSeBlmSgW0-hdwdbopPXT_53mEr9x1yb5A2fLIOyeW7F5iZQrQ/viewform?usp=sharing">tutaj</a>.</p>
  </main>

  <script>
    window.location.replace('https://docs.google.com/forms/d/e/1FAIpQLSeBlmSgW0-hdwdbopPXT_53mEr9x1yb5A2fLIOyeW7F5iZQrQ/viewform?usp=sharing');
  </script>
</body>
</html>
